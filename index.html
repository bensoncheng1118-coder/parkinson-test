    <style>
        .phrase-btn,
        .nav-btn,
        .ctrl-btn {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
/* 所有可點擊按鈕都先保留邊框空間，避免框框出現時版面跳動 */
button,
select,
.phrase-btn,
.nav-btn,
.ctrl-btn,
#vocab-selection-grid > div {
    box-sizing: border-box;
}

/* 滑鼠 hover、鍵盤聚焦、頭控/眼控停留時，都顯示外框 */
button:hover,
select:hover,
.phrase-btn:hover,
.nav-btn:hover,
.ctrl-btn:hover,
#vocab-selection-grid > div:hover,
button:focus-visible,
select:focus-visible,
.phrase-btn:focus-visible,
.nav-btn:focus-visible,
.ctrl-btn:focus-visible,
.gaze-hover {
    outline: 5px solid #facc15;
    outline-offset: 4px;
}

/* 九宮格詞彙按鈕：滑鼠與頭控/眼控停留都更明顯 */
.phrase-btn:hover,
.phrase-btn.gaze-hover {
    border-color: #22c55e;
    box-shadow: 0 6px 0 #16a34a, 0 0 0 6px rgba(250, 204, 21, 0.45);
}

/* 下方類別按鈕：滑鼠與頭控/眼控停留 */
.nav-btn:hover,
.nav-btn.gaze-hover {
    box-shadow: 0 6px 8px rgba(0, 0, 0, 0.18), 0 0 0 6px rgba(250, 204, 21, 0.55);
}

/* 播放、清除按鈕：滑鼠與頭控/眼控停留 */
.ctrl-btn:hover,
.ctrl-btn.gaze-hover {
    box-shadow: 0 6px 8px rgba(0, 0, 0, 0.18), 0 0 0 6px rgba(250, 204, 21, 0.55);
}

/* 類別按鈕按下後保留框框 */
.nav-btn.active-nav {
    outline: 5px solid #facc15;
    outline-offset: 4px;
    box-shadow: 0 6px 8px rgba(0, 0, 0, 0.2), 0 0 0 7px rgba(250, 204, 21, 0.65);
}
        /* 調整中間按鈕：移除正方形限制，使其呈現大又寬的長方形並充滿網格 */
        .phrase-btn {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 28px;
            background-color: white;
            box-shadow: 0 6px 0 #cbd5e1;
            border: 3px solid #e2e8f0;
            transition: all 0.05s;
            gap: 12px;
        }

        .gaze-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background-color: rgba(34, 197, 94, 0.2);
            transition: width 0.1s linear;
            pointer-events: none;
            z-index: 0;
        }

        .btn-content {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .icon-main {
            font-size: 3.5rem !important;
            color: #22c55e;
        }
	.arasaac-icon {
            width: 76px;
            height: 76px;
            object-fit: contain;
            display: block;
        }

        .arasaac-icon-small {
            width: 48px;
            height: 48px;
            object-fit: contain;
            display: block;
        }

        .text-main {
            font-size: 1.6rem;
            font-weight: 900;
            color: #1e293b;
        }

        /* 最下排導覽按鈕維持大尺寸 */
        .nav-btn {
            height: 130px;
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            border-radius: 24px;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        #display-box {
            min-height: 60px;
            max-height: 60px;
            font-size: 1.6rem;
            background: white;
            border: 3px solid #22c55e;
            border-radius: 16px;
            padding: 5px 15px;
            font-weight: bold;
            color: #15803d;
            display: flex;
            align-items: center;
            overflow-x: auto;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        #head-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            background-color: rgba(34, 197, 94, 0.8);
            border: 3px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        /* 完全隱藏右下角的視訊畫面，不影響追蹤功能 */
        #webcam-preview {
            position: fixed;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        #loading-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            font-size: 1.5rem;
            z-index: 10000;
            display: none;
        }

        /* 新增：左側右拉選單動畫與遮罩樣式 */
        #settings-sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 10050;
        }
        #sidebar-overlay {
            transition: opacity 0.3s ease-in-out;
            z-index: 10040;
        }
.category-arasaac-icon {
    width: 58px;
    height: 58px;
    object-fit: contain;
    display: block;
    margin-bottom: 6px;
}

.category-material-icon {
    font-size: 3rem !important;
    margin-bottom: 6px;
}
html,
body {
    width: 100%;
    height: 100%;
}

/* 桌機維持原本大按鈕，不縮小 */
body {
    min-height: 100vh;
    padding: 16px !important;
    overflow: hidden;
}

#grid-container {
    min-height: 0;
}

/* 只有平板與手機才開始自適應 */
@media (max-width: 900px) {
    body {
        min-height: 100dvh;
        padding: 10px !important;
        overflow-y: auto;
    }

    body > .flex.gap-3.mb-2 {
        gap: 8px;
        margin-bottom: 8px;
        flex-wrap: wrap;
    }

    #btn-settings-toggle {
        width: 64px !important;
        height: 52px !important;
    }

    #btn-lang-toggle {
        width: 112px !important;
        height: 52px !important;
    }

    #btn-mode {
        width: 112px !important;
        height: 52px !important;
        font-size: 0.85rem;
    }

    #btn-play,
    #btn-clear {
        width: 72px !important;
        height: 52px !important;
    }

    #display-box {
        order: 10;
        flex-basis: 100%;
        min-height: 52px;
        max-height: 52px;
        font-size: 1.25rem;
    }

    #grid-container {
        gap: 10px !important;
        margin-bottom: 10px !important;
        min-height: 52vh;
    }

    .phrase-btn {
        border-radius: 20px;
        gap: 8px;
    }

    .icon-main {
        font-size: 2.8rem !important;
    }

    .arasaac-icon {
        width: 62px;
        height: 62px;
    }

    .text-main {
        font-size: 1.25rem;
        line-height: 1.15;
        text-align: center;
    }

    .nav-btn {
        height: 96px;
        font-size: 1.5rem;
        border-radius: 18px;
    }

    .category-material-icon {
        font-size: 2.2rem !important;
        margin-bottom: 4px;
    }

    .category-arasaac-icon {
        width: 42px;
        height: 42px;
        margin-bottom: 4px;
    }

    body > .grid.grid-cols-5 {
        gap: 8px;
    }
}

/* 很小的手機再縮一層 */
@media (max-width: 480px) {
    body {
        padding: 6px !important;
    }

    body > .flex.gap-3.mb-2 {
        gap: 6px;
    }

    #grid-container {
        gap: 6px !important;
        min-height: 50vh;
    }

    .phrase-btn {
        border-radius: 14px;
        border-width: 2px;
        gap: 4px;
        box-shadow: 0 4px 0 #cbd5e1;
    }

    .icon-main {
        font-size: 2rem !important;
    }

    .arasaac-icon {
        width: 42px;
        height: 42px;
    }

    .text-main {
        font-size: 0.95rem;
    }

    .nav-btn {
        height: 72px;
        font-size: 1rem;
        border-radius: 14px;
    }

    .category-material-icon {
        font-size: 1.7rem !important;
        margin-bottom: 2px;
    }

    .category-arasaac-icon {
        width: 30px;
        height: 30px;
        margin-bottom: 2px;
    }

    button:hover,
    select:hover,
    .phrase-btn:hover,
    .nav-btn:hover,
    .ctrl-btn:hover,
    .gaze-hover,
    .nav-btn.active-nav {
        outline-width: 3px;
        outline-offset: 2px;
    }
}
/* 手機很窄時：九宮格仍維持 3x3，但按鈕內容縮小 */
@media (max-width: 480px) {
    button:hover,
    select:hover,
    .phrase-btn:hover,
    .nav-btn:hover,
    .ctrl-btn:hover,
    .gaze-hover,
    .nav-btn.active-nav {
        outline-width: 3px;
        outline-offset: 2px;
    }

    #grid-container {
        gap: 6px !important;
    }

    .phrase-btn {
        border-width: 2px;
        box-shadow: 0 4px 0 #cbd5e1;
    }

    .text-main {
        font-size: clamp(0.85rem, 4vw, 1.1rem);
    }

    .nav-btn {
        height: clamp(58px, 11vh, 82px);
    }

    .category-material-icon {
        font-size: clamp(24px, 7vw, 34px) !important;
    }

    .category-arasaac-icon {
        width: clamp(24px, 7vw, 34px);
        height: clamp(24px, 7vw, 34px);
    }
}
    </style>

            const keyword = String(searchText || '').trim().toLowerCase();

                const iconUrl = pictogramId ? `${ARASAAC_PICTOGRAM_BASE}/${pictogramId}?download=false` : null;

                return iconUrl;

                arasaacIconCache.set(keyword, null);

            const totalAvailable = FULL_VOCABULARY_DATABASE[currentVocabTab].filter(item => {

                const iconName = String(item[1] || '').toLowerCase();

                // 點擊事件：切換選取狀態，並嚴格限制只能選擇 9 個
                card.onclick = () => {
                    const idx = selectedList.indexOf(text);
                    if (idx > -1) {
                        // 原本已選取 -> 取消選取
                        selectedList.splice(idx, 1);

                        // 原本未選取 -> 檢查是否超過 9 個

                    renderVocabSelectionGrid();

            });

        "use strict";
        function getTaigiText(text) {
            return taigiTextMap[text] || text;
        }

        async function speakTaigiOnline(text) {
            if (!TAIGI_TTS_ENDPOINT) {
                return false;
            }

            const taigiText = getTaigiText(text);

            try {
                window.speechSynthesis.cancel();

                let audioUrl = taigiAudioCache.get(taigiText);

                if (!audioUrl) {
                    const response = await fetch(`${TAIGI_TTS_ENDPOINT}${encodeURIComponent(taigiText)}`);
                    if (!response.ok) throw new Error('台語 TTS 服務無法使用');

                    const audioBlob = await response.blob();
                    audioUrl = URL.createObjectURL(audioBlob);
                    taigiAudioCache.set(taigiText, audioUrl);
                }

                const audio = new Audio(audioUrl);
                await audio.play();
                return true;
            } catch (error) {
                console.warn('台語線上語音播放失敗，改用瀏覽器語音：', error);
                return false;
            }
        }

        async function speakText(text) {
            window.speechSynthesis.cancel();

            if (currentLanguage === 'nan-TW') {
                const played = await speakTaigiOnline(text);
                if (played) return;
            }

            const msg = new SpeechSynthesisUtterance(
                currentLanguage === 'nan-TW' ? getTaigiText(text) : text
            );

            if (currentLanguage === 'nan-TW') {
                const voices = window.speechSynthesis.getVoices();
                const taiwaneseVoice = voices.find(v =>
                    v.lang.includes('nan') ||
                    v.lang.includes('hak') ||
                    v.name.includes('Taiwanese') ||
                    v.name.includes('台語') ||
                    v.name.includes('閩南')
                );

                if (taiwaneseVoice) {
                    msg.voice = taiwaneseVoice;
                    msg.lang = taiwaneseVoice.lang;
                } else {
                    msg.lang = 'zh-TW';
                }
            } else {
                msg.lang = 'zh-TW';
            }

            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        async function playAll() {

                webgazer.setGazeListener((data, clock) => {
                    if (currentMode !== 'eye' || data == null) return;

                    // 只要一拿到資料，代表載入成功，隱藏載入狀態
                    if (loadingElement.style.display !== 'none') {
                        loadingElement.style.display = 'none';
                        cursorElement.style.display = 'block';
                    }

                    // 限制游標在螢幕範圍內
                    const finalX = Math.max(0, Math.min(window.innerWidth, data.x));
                    const finalY = Math.max(0, Math.min(window.innerHeight, data.y));

                    cursorElement.style.left = `${finalX}px`;
                    cursorElement.style.top = `${finalY}px`;

                    checkHover(finalX, finalY);

                webgazer.showVideoPreview(true)
                         .showPredictionPoints(false);

                isWebGazerInitialized = true;
                return true;
            } catch (err) {
                console.error("WebGazer 初始化失敗:", err);
                document.getElementById('loading-status').innerText = `WebGazer 初始化失敗: ${err.message}`;
                return false;

                webgazer.resume()
                    .then(() => {
                        // 成功啟動後，調整 WebGazer 預設小視窗的位置與大小
                        setTimeout(() => {
                            const wgVideo = document.getElementById('webgazerVideoFeed');
                            if (wgVideo) {
                                wgVideo.style.display = 'block';
                                wgVideo.style.position = 'fixed';
                                wgVideo.style.bottom = '10px';
                                wgVideo.style.right = '10px';
                                wgVideo.style.width = '160px';
                                wgVideo.style.height = '120px';
                                wgVideo.style.zIndex = '9999';
                                wgVideo.style.transform = 'scaleX(-1)'; // 鏡像
                            }
                            // 隱藏不必要的 canvas 疊加層
                            const wgCanvas = document.getElementById('webgazerFaceOverlay');
                            if (wgCanvas) wgCanvas.style.display = 'none';
                            const wgFeedback = document.getElementById('webgazerFaceFeedbackBox');
                            if (wgFeedback) wgFeedback.style.display = 'none';
                        }, 1200);
                    })
                    .catch(err => {
                        console.error("WebGazer 核心啟動失敗:", err);
                        loadingElement.innerText = `眼控鏡頭啟動失敗，請確認是否有其他應用程式佔用了鏡頭。錯誤: ${err.message}`;
                    });
            }
        }

        // 🛠️ 終極強化版：停止鏡頭與偵測
        function stopCameraAndAI() {
            const videoElement = document.getElementById('webcam-preview');
            const cursorElement = document.getElementById('head-cursor');
            const loadingElement = document.getElementById('loading-status');
            
            videoElement.style.display = 'none';
            cursorElement.style.display = 'none';
            loadingElement.style.display = 'none';

            // 關閉 MediaPipe
            if (isCameraRunning && camera) {
                try { camera.stop(); } catch(e){}
                isCameraRunning = false;
            }

            // 關閉並隱藏 WebGazer
            if (isWebGazerInitialized && typeof webgazer !== 'undefined') {
                try { webgazer.pause(); } catch(e){}
                hideWebGazerUI();
            }
        }

        // 輔助函式：強制隱藏 WebGazer 自動產生的所有 UI 元素
        function hideWebGazerUI() {
            const ids = ['webgazerVideoFeed', 'webgazerFaceOverlay', 'webgazerFaceFeedbackBox'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
        }
        function checkHover(x, y) {
            const gridContainer = document.getElementById('grid-container');
            const leftBoundary = window.innerWidth * 0.10;
            const rightBoundary = window.innerWidth * 0.90;

            if (y > 75 && y < (window.innerHeight - 145)) {
                if (x < leftBoundary) {
                    gridContainer.scrollLeft -= 12;
                } else if (x > rightBoundary) {
                    gridContainer.scrollLeft += 12;
                }
            }

            const targetEl = document.elementFromPoint(x, y);
            const clickableBtn = targetEl?.closest('.phrase-btn, .nav-btn, .ctrl-btn');

            if (clickableBtn) {
                if (currentHoveredElement === clickableBtn) {
                    const duration = Date.now() - gazeStartTime;
                    const progress = Math.min((duration / DWEL_TIME) * 100, 100);

                    const progressEl = clickableBtn.querySelector('.gaze-progress');
                    if (progressEl) progressEl.style.width = `${progress}%`;

                    if (duration >= DWEL_TIME) {
                        clickableBtn.click();
                    }
                } else {
                    resetGaze();
                    currentHoveredElement = clickableBtn;
                    currentHoveredElement.classList.add('gaze-hover');
                    gazeStartTime = Date.now();
                }
            } else {
                resetGaze();
            }
        }

        function showError() {
            document.getElementById('loading-status').innerHTML = `
                <div class="text-red-400 font-bold mb-2">鏡頭啟動失敗</div>
                <div class="text-sm text-gray-300 text-left">
                    1. 由於安全性限制，本地檔案 (file://) 無法開啟鏡頭。<br>
                    2. 請先將檔案部署到 <span class="text-yellow-300">GitHub Pages</span>（HTTPS環境）再開啟。<br>
                    3. 開啟網頁後，請務必點擊瀏覽器的「允許」鏡頭權限。
                </div>
            `;
            document.getElementById('loading-status').style.display = 'block';
        }

        window.onload = () => {
            updateGrid('common');
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
        };
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('Service Worker 已註冊'))
                    .catch(error => console.warn('Service Worker 註冊失敗：', error));
            });
        }
    </script>
<div id="loading-status" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 8px; z-index: 999999; display: none; font-size: 18px; pointer-events: none;">
    AI 模式載入中...
</div>

<div id="head-cursor" style="position: fixed; width: 30px; height: 30px; border: 4px solid #ef4444; background-color: rgba(239, 68, 68, 0.2); border-radius: 50%; pointer-events: none; z-index: 999999; display: none; transform: translate(-50%, -50%); transition: left 0.1s ease, top 0.1s ease;"></div>

<video id="webcam-preview" autoplay playsinline style="display: none; width: 640px; height: 480px;"></video>
</body>
